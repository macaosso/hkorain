<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKO Nowcast & Macau SMG Rainfall Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        .leaflet-container { background: #222a35 !important; }
        .custom-radar-label { color: rgba(255, 255, 255, 0.5); font-size: 10px; font-weight: bold; }
        .map-rain-label { font-size: 10px; font-weight: 800; text-align: center; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
    </style>
</head>
<body class="bg-[#1a1f26] text-gray-100 font-sans h-screen flex flex-col">

    <header class="bg-[#2d363f] border-b border-gray-700 p-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-white">HKO & SMG Rainfall Sync</h1>
            <p id="statusBadge" class="text-xs text-yellow-400">Initializing...</p>
        </div>
        <button id="refreshBtn" class="bg-cyan-600 px-4 py-2 rounded text-sm font-semibold">Refresh All</button>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section class="w-80 bg-[#2d363f] border-r border-gray-700 p-4 overflow-y-auto">
            <div id="macauAlertBox" class="p-3 mb-4 rounded border border-gray-700 bg-[#222a35]">
                <h3 class="text-xs font-bold text-gray-400 uppercase">Alert Status</h3>
                <div id="macauAlertContent" class="text-xs mt-2">Loading...</div>
            </div>
            <div id="peakContainer" class="text-xs"></div>
        </section>
        <section id="map" class="flex-1"></section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, csvData = [];
        let hkoLoaded = false, smgLoaded = false;
        const gridLayerGroup = L.layerGroup();
        const MACAU_LAT = 22.1595, MACAU_LON = 113.5685;

        // Using reliable proxies for specific protocols
        const HKO_PROXY = "https://api.allorigins.win/get?url=";
        const SMG_PROXY = "https://corsproxy.io/?url=";

        function initMap() {
            map = L.map('map').setView([22.1595, 113.65], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            gridLayerGroup.addTo(map);
        }

        function checkGlobalSync() {
            if(hkoLoaded && smgLoaded) {
                document.getElementById('statusBadge').innerText = "Live: HKO + SMG Synced";
                document.getElementById('statusBadge').className = "text-green-400";
            }
        }

        async function loadData() {
            hkoLoaded = false; smgLoaded = false;
            document.getElementById('statusBadge').innerText = "Syncing...";

            // 1. Fetch HKO via AllOrigins (handles protocol handshake)
            const hkoUrl = encodeURIComponent(`https://data.weather.gov.hk/weatherAPI/hko_data/F3/Gridded_rainfall_nowcast_tc.csv?t=${Date.now()}`);
            fetch(HKO_PROXY + hkoUrl)
                .then(res => res.json())
                .then(data => {
                    Papa.parse(data.contents, {
                        header: true,
                        complete: (results) => {
                            csvData = results.data;
                            hkoLoaded = true;
                            checkGlobalSync();
                            renderMap();
                        }
                    });
                })
                .catch(err => console.error("HKO Error:", err));

            // 2. Fetch SMG via CorsProxy
            const smgUrl = encodeURIComponent(`https://xml.smg.gov.mo/c_actualweather.xml?t=${Date.now()}`);
            fetch(SMG_PROXY + smgUrl)
                .then(res => res.text())
                .then(xml => {
                    smgLoaded = true;
                    checkGlobalSync();
                })
                .catch(err => console.error("SMG Error:", err));
        }

        function renderMap() {
            gridLayerGroup.clearLayers();
            csvData.forEach(pt => {
                if (!pt.lat || !pt.rain) return;
                const color = pt.rain > 10 ? '#ff0000' : '#2fdbeb';
                L.rectangle([[pt.lat-0.01, pt.lon-0.01], [pt.lat+0.01, pt.lon+0.01]], {
                    color: color, fillOpacity: 0.5
                }).addTo(gridLayerGroup);
            });
        }

        document.getElementById('refreshBtn').addEventListener('click', loadData);
        window.onload = () => { initMap(); loadData(); };
    </script>
</body>
</html>
